  <style>
    :root {
      --bg0: #15171c; --bg1: #1d2026; --line: rgba(255,255,255,.10);
      --ink: #f4f5f7; --muted: #9ea3ad; --amber: #e6b25e;
      --font: 'DM Sans', -apple-system, sans-serif; --mono: 'Fragment Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--font); color: var(--ink);
      background: var(--bg1); overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    /* Fondo animado (canvas red molecular) */
    #bg { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 0; }
    /* Brillo radial + viñeta sobre el canvas */
    .glow {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(60% 55% at 50% 42%, rgba(120,130,150,.16), transparent 70%),
        radial-gradient(120% 120% at 50% 120%, rgba(0,0,0,.55), transparent 60%);
    }
    /* Marca gigante muy tenue de fondo, girando lento */
    .watermark {
      position: fixed; z-index: 1; top: 50%; left: 50%;
      width: min(70vmin, 620px); aspect-ratio: 1;
      transform: translate(-50%, -54%);
      opacity: .035; pointer-events: none;
      -webkit-mask: url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20641.02%20558.18%22%20fill%3D%22currentColor%22%20role%3D%22img%22%20aria-label%3D%22Codex%20Research%22%3E%3Cpath%20fill-rule%3D%22evenodd%22%20d%3D%22M214.96%20187.97%20L162.94%2097.99%20L215.43%208.00%20L423.52%208.00%20L528.50%20188.44%20L476.46%20279.41%20L424.46%20370.29%20L371.96%20280.30%20L423.52%20188.44%20L372.43%2098.46%20L267.45%2098.46%20Z%20M579.59%20279.76%20L633.02%20369.51%20L528.27%20549.71%20L319.47%20549.95%20L215.19%20369.74%20L319.94%20369.51%20L371.73%20460.43%20L476.24%20460.66%20L528.97%20369.98%20L476.46%20279.41%20Z%20M320.14%20189.07%20L268.35%20278.47%20L161.72%20278.23%20L109.94%20369.86%20L161.61%20460.31%20L266.59%20460.78%20L214.33%20549.83%20L111.58%20550.18%20L8.00%20369.51%20L111.69%20189.07%20Z%22/%3E%3C/svg%3E) center/contain no-repeat;
      mask: url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20641.02%20558.18%22%20fill%3D%22currentColor%22%20role%3D%22img%22%20aria-label%3D%22Codex%20Research%22%3E%3Cpath%20fill-rule%3D%22evenodd%22%20d%3D%22M214.96%20187.97%20L162.94%2097.99%20L215.43%208.00%20L423.52%208.00%20L528.50%20188.44%20L476.46%20279.41%20L424.46%20370.29%20L371.96%20280.30%20L423.52%20188.44%20L372.43%2098.46%20L267.45%2098.46%20Z%20M579.59%20279.76%20L633.02%20369.51%20L528.27%20549.71%20L319.47%20549.95%20L215.19%20369.74%20L319.94%20369.51%20L371.73%20460.43%20L476.24%20460.66%20L528.97%20369.98%20L476.46%20279.41%20Z%20M320.14%20189.07%20L268.35%20278.47%20L161.72%20278.23%20L109.94%20369.86%20L161.61%20460.31%20L266.59%20460.78%20L214.33%20549.83%20L111.58%20550.18%20L8.00%20369.51%20L111.69%20189.07%20Z%22/%3E%3C/svg%3E) center/contain no-repeat;
      background: #fff;
      animation: spin 60s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%, -54%) rotate(360deg); } }

    .wrap {
      position: relative; z-index: 2;
      min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem 1.5rem;
      gap: 0;
    }
    .logo { height: 34px; width: auto; margin-bottom: 2.4rem; opacity: 0; animation: rise .8s .05s ease forwards; }

    .status {
      display: inline-flex; align-items: center; gap: .55rem;
      font-family: var(--mono); font-size: .74rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--line); border-radius: 999px;
      padding: .5rem 1rem; margin-bottom: 2rem;
      background: rgba(255,255,255,.02); backdrop-filter: blur(4px);
      opacity: 0; animation: rise .8s .15s ease forwards;
    }
    .status .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--amber);
      box-shadow: 0 0 0 0 rgba(230,178,94,.55); animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(230,178,94,.5); }
      70% { box-shadow: 0 0 0 9px rgba(230,178,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(230,178,94,0); }
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.4rem); line-height: 1.03; letter-spacing: -.04em;
      font-weight: 700; max-width: 16ch;
      opacity: 0; animation: rise .8s .25s ease forwards;
    }
    h1 em { font-style: normal; color: var(--muted); }
    .sub {
      color: var(--muted); font-size: clamp(1rem, 2.2vw, 1.15rem); line-height: 1.6;
      max-width: 52ch; margin-top: 1.4rem;
      opacity: 0; animation: rise .8s .35s ease forwards;
    }

    /* Barra de progreso indeterminada */
    .bar {
      width: min(320px, 80vw); height: 4px; border-radius: 999px;
      background: rgba(255,255,255,.08); overflow: hidden; margin-top: 2.4rem;
      opacity: 0; animation: rise .8s .45s ease forwards;
    }
    .bar i {
      display: block; height: 100%; width: 38%; border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.85), transparent);
      animation: slide 1.8s cubic-bezier(.65,0,.35,1) infinite;
    }
    @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(360%); } }

    .cta-row {
      display: flex; align-items: center; gap: 1.4rem; flex-wrap: wrap; justify-content: center;
      margin-top: 2.6rem;
      opacity: 0; animation: rise .8s .55s ease forwards;
    }
    .btn {
      display: inline-flex; align-items: center; gap: .55rem;
      background: #fff; color: #16181c; font-weight: 600; font-size: .95rem;
      padding: .85rem 1.6rem; border-radius: 999px; text-decoration: none;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,.35); }
    .link { color: var(--muted); font-size: .92rem; text-decoration: none; transition: color .15s; }
    .link:hover { color: var(--ink); }

    .foot {
      position: fixed; bottom: 1.4rem; left: 0; right: 0; z-index: 2;
      text-align: center; color: rgba(255,255,255,.28);
      font-family: var(--mono); font-size: .68rem; letter-spacing: .1em; text-transform: uppercase;
    }

    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .watermark, .bar i, .status .dot { animation: none; }
      .logo, .status, h1, .sub, .bar, .cta-row { animation: none; opacity: 1; }
    }
  </style>
</head>

    <p class="sub">
      Codex Research is undergoing scheduled maintenance to improve your experience.
      Our catalog is temporarily offline.
    </p>

    <div class="bar" aria-hidden="true"><i></i></div>

    <p class="sub" style="margin-top:2.2rem;font-size:.9rem;animation-delay:.55s;">
      Thank you for your patience. We’ll be online again soon.
    </p>
  </main>

  <p class="foot">Codex Research · For research use only</p>

  <script>
    (function () {
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');
      let w, h, dpr, particles = [], mouse = { x: -9999, y: -9999 };

      function size() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = canvas.width = innerWidth * dpr;
        h = canvas.height = innerHeight * dpr;
        canvas.style.width = innerWidth + 'px';
        canvas.style.height = innerHeight + 'px';
        const count = Math.min(110, Math.floor((innerWidth * innerHeight) / 14000));
        particles = [];
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.28 * dpr,
            vy: (Math.random() - 0.5) * 0.28 * dpr,
            r: (Math.random() * 1.6 + 0.6) * dpr,
          });
        }
      }

      const LINK = 130; // distancia de enlace (px CSS)
      function render() {
        ctx.clearRect(0, 0, w, h);
        const link = LINK * dpr;
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;

          // enlaces entre partículas
          for (let j = i + 1; j < particles.length; j++) {
            const q = particles[j];
            const dx = p.x - q.x, dy = p.y - q.y;
            const d = Math.hypot(dx, dy);
            if (d < link) {
              const a = (1 - d / link) * 0.16;
              ctx.strokeStyle = 'rgba(200,208,222,' + a + ')';
              ctx.lineWidth = dpr * 0.6;
              ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
            }
          }
          // enlace al cursor
          const mdx = p.x - mouse.x, mdy = p.y - mouse.y;
          const md = Math.hypot(mdx, mdy);
          if (md < link * 1.4) {
            const a = (1 - md / (link * 1.4)) * 0.28;
            ctx.strokeStyle = 'rgba(230,178,94,' + a + ')';
            ctx.lineWidth = dpr * 0.7;
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
          }
          // punto
          ctx.fillStyle = 'rgba(226,231,240,.7)';
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        }
      }
      function frame() { render(); requestAnimationFrame(frame); }

      addEventListener('resize', size);
      addEventListener('mousemove', (e) => { mouse.x = e.clientX * dpr; mouse.y = e.clientY * dpr; });
      addEventListener('mouseleave', () => { mouse.x = mouse.y = -9999; });
      const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      size();
      if (reduce) render(); else frame();  // reduced-motion: un solo frame estático
    })();
  </script>
